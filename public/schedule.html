<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JW Helper — Ajakava</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrap">

  <header>
    <div>
      <h1>JW Helper</h1>
      <p>Kuu ajakava genereerimine</p>
    </div>
    <nav>
      <a href="index.html">Inimesed</a>
      <a href="schedule.html" class="active">Ajakava</a>
    </nav>
  </header>

  <div class="panel no-print">
    <h2>Vali kuu ja koosoleku päev(ad)</h2>
    <div class="row">
      <div>
        <label for="monthSelect">Kuu</label>
        <select id="monthSelect"></select>
      </div>
      <div>
        <label for="yearSelect">Aasta</label>
        <select id="yearSelect"></select>
      </div>
    </div>

    <label>Koosoleku nädalapäev(ad)</label>
    <div class="weekday-picker" id="weekdayPicker"></div>
    <p class="hint">Tavaliselt on Elu ja teenistuse koosolek üks kindel argipäev ning avalik kõne/Vahitorni uurimine pühapäev. Vali mõlemad, kui mõlemad tabelisse lähevad.</p>

    <div class="actions">
      <button class="primary" id="previewBtn">Näita eelvaadet</button>
      <button class="secondary" id="saveBtn">Salvesta ajakava</button>
      <button class="secondary" id="printBtn">Prindi / PDF</button>
    </div>
    <div class="status" id="genStatus"></div>
  </div>

  <div class="panel" id="previewPanel" style="display:none;">
    <div class="list-header">
      <h2 id="previewTitle">Eelvaade</h2>
    </div>
    <table class="schedule-table" id="scheduleTable">
      <thead><tr id="scheduleHeadRow"></tr></thead>
      <tbody id="scheduleBody"></tbody>
    </table>
  </div>

</div>

<script>
const monthSelect = document.getElementById('monthSelect');
const yearSelect = document.getElementById('yearSelect');
const weekdayPicker = document.getElementById('weekdayPicker');
const genStatus = document.getElementById('genStatus');

const ESTONIAN_MONTHS = ["Jaanuar","Veebruar","Märts","Aprill","Mai","Juuni","Juuli","August","September","Oktoober","November","Detsember"];
const WEEKDAYS = [
  { value: 0, label: 'Pühapäev' },
  { value: 1, label: 'Esmaspäev' },
  { value: 2, label: 'Teisipäev' },
  { value: 3, label: 'Kolmapäev' },
  { value: 4, label: 'Neljapäev' },
  { value: 5, label: 'Reede' },
  { value: 6, label: 'Laupäev' },
];
let selectedWeekdays = [0]; // default Sunday

ESTONIAN_MONTHS.forEach((m, idx) => {
  const opt = document.createElement('option');
  opt.value = idx + 1;
  opt.textContent = m;
  monthSelect.appendChild(opt);
});
const now = new Date();
monthSelect.value = now.getMonth() + 1;

for (let y = now.getFullYear(); y <= now.getFullYear() + 1; y++) {
  const opt = document.createElement('option');
  opt.value = y;
  opt.textContent = y;
  yearSelect.appendChild(opt);
}
yearSelect.value = now.getFullYear();

function renderWeekdayPicker() {
  weekdayPicker.innerHTML = '';
  WEEKDAYS.forEach(w => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'weekday-btn' + (selectedWeekdays.includes(w.value) ? ' active' : '');
    btn.textContent = w.label;
    btn.addEventListener('click', () => {
      if (selectedWeekdays.includes(w.value)) {
        selectedWeekdays = selectedWeekdays.filter(x => x !== w.value);
      } else {
        selectedWeekdays.push(w.value);
      }
      renderWeekdayPicker();
    });
    weekdayPicker.appendChild(btn);
  });
}
renderWeekdayPicker();

async function api(path, options) {
  const res = await fetch(path, {
    headers: { 'Content-Type': 'application/json' },
    ...options
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({ error: 'Tundmatu viga' }));
    throw new Error(err.error || 'Viga');
  }
  return res.json();
}

function setStatus(msg, isError) {
  genStatus.textContent = msg;
  genStatus.className = 'status' + (isError ? ' err' : '');
}

const previewPanel = document.getElementById('previewPanel');
const previewTitle = document.getElementById('previewTitle');
const scheduleHeadRow = document.getElementById('scheduleHeadRow');
const scheduleBody = document.getElementById('scheduleBody');

function renderScheduleTable(data) {
  previewTitle.textContent = `${ESTONIAN_MONTHS[data.month - 1]} ${data.year}`;

  scheduleHeadRow.innerHTML = '<th>Kuupäev</th>' + data.roles.map(r => `<th>${r}</th>`).join('');

  scheduleBody.innerHTML = '';
  if (data.rows.length === 0) {
    scheduleBody.innerHTML = `<tr><td colspan="${data.roles.length + 1}" style="text-align:center;color:var(--muted);padding:24px;">Valitud kuul ja nädalapäeval koosolekuid ei leitud.</td></tr>`;
    previewPanel.style.display = 'block';
    return;
  }

  data.rows.forEach(row => {
    const tr = document.createElement('tr');
    let cells = `<td class="date-cell">${row.date_label}</td>`;
    data.roles.forEach(role => {
      const a = row.assignments[role];
      if (a) {
        cells += `<td>${a.short_name}</td>`;
      } else {
        cells += `<td class="empty-slot">—</td>`;
      }
    });
    tr.innerHTML = cells;
    scheduleBody.appendChild(tr);
  });

  previewPanel.style.display = 'block';
}

async function generate(save) {
  const year = parseInt(yearSelect.value, 10);
  const month = parseInt(monthSelect.value, 10);

  if (selectedWeekdays.length === 0) {
    setStatus('Vali vähemalt üks nädalapäev.', true);
    return;
  }

  try {
    setStatus(save ? 'Salvestan...' : 'Genereerin...', false);
    const data = await api(save ? '/api/schedule/save' : '/api/schedule/preview', {
      method: 'POST',
      body: JSON.stringify({ year, month, weekdays: selectedWeekdays })
    });
    renderScheduleTable(data);
    setStatus(save ? 'Ajakava salvestatud.' : `Eelvaade — ${data.rows.length} koosolekut.`, false);
  } catch (e) {
    setStatus(e.message, true);
  }
}

document.getElementById('previewBtn').addEventListener('click', () => generate(false));
document.getElementById('saveBtn').addEventListener('click', () => {
  if (!confirm('Salvestamine jätab inimeste rollide jaotuse arvele (mõjutab tasakaalu järgmistel kuudel). Kas jätkata?')) return;
  generate(true);
});
document.getElementById('printBtn').addEventListener('click', () => window.print());
</script>
</body>
</html>
